<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROBASEONE - Japan 1st EP "PREZENT" 抽選会</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-bg: #030303;
            --color-card: #111111;
            --color-border: #333333;
            --color-primary: #00d2ff; /* Whoop Light Blue */
            --color-secondary: #3a7bd5;
            --color-win: #ffd700;
        }

        body {
            background-color: var(--color-bg);
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Whoop-style Frosted Glass Card */
        .whoop-card {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .whoop-card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        /* Member Select styling */
        .member-dot {
            width: 12px; height: 12px; border-radius: 50%; border: 2px solid #555;
            transition: all 0.2s;
        }
        .member-radio:checked + .member-label .member-dot {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            box-shadow: 0 0 10px var(--color-primary);
        }

        /* Input styling */
        input[type="number"] {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }

        /* Button styling */
        .btn-primary {
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            color: black;
            font-weight: bold;
            border-radius: 50px;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.8; }
        .btn-primary:disabled { background: #333; color: #777; cursor: not-allowed; }

        /* Lottery Modal */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter mb-2" style="background: linear-gradient(90deg, #00d2ff, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            ZEROBASEONE
        </h1>
        <p class="text-sm text-gray-400 tracking-widest uppercase">Japan 1st EP "PREZENT" SPECIAL LOTTERY</p>
    </header>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-10">
        
        <div class="lg:col-span-2 space-y-8">
            
            <div class="whoop-card p-6 flex flex-col md:flex-row items-center gap-6">
                <div class="w-32 h-32 bg-gray-800 rounded-lg flex-shrink-0 border border-gray-700 items-center justify-center flex">
                    <span class="text-3xl">💿</span>
                </div>
                <div>
                    <span class="inline-block bg-blue-900 text-blue-200 text-xs px-3 py-1 rounded-full mb-2">日本デビュー記念</span>
                    <h2 class="text-2xl font-bold mb-1">【個別サイン会】抽選権利付きCD</h2>
                    <p class="text-sm text-gray-400 mb-4">希望メンバーを選択し、購入枚数分だけ抽選に挑戦できます。</p>
                    <div class="text-2xl font-mono text-white">¥3,600 <span class="text-sm text-gray-500">(税込)</span></div>
                </div>
            </div>
