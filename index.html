<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROBASEONE - Japan 1st EP "PREZENT" 抽選会</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-white: #ffffff;
            --whoop-green: #00e676; /* P1H同款亮绿 */
            --soft-gray: #f5f5f7;
            --border-light: #e0e0e2;
        }

        body {
            background-color: var(--bg-white);
            color: #1d1d1f;
            font-family: -apple-system, "SF Pro JP", "Hiragino Kaku Gothic ProN", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 复刻 P1H 的毛玻璃卡片 (白色版) */
        .p1h-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 鼠标悬浮：边框变绿并微发光 */
        .p1h-card:hover {
            border-color: var(--whoop-green);
            box-shadow: 0 8px 30px rgba(0, 230, 118, 0.1);
        }

        /* 成员选中样式：复刻 P1H 的圆点和边框逻辑 */
        .member-radio:checked + label {
            border-color: var(--whoop-green);
            background: rgba(0, 230, 118, 0.03);
        }

        .p1h-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #d2d2d7; 
            display: inline-block; margin-right: 12px; transition: all 0.2s;
        }
        .member-radio:checked + label .p1h-dot {
            background: var(--whoop-green);
            box-shadow: 0 0 10px var(--whoop-green);
        }

        /* 按钮：P1H 标志性的大圆角胶囊按钮 */
        .p1h-btn {
            background: #000000;
            color: #ffffff;
            border-radius: 999px;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .p1h-btn:hover {
            background: var(--whoop-green);
            color: #000000;
        }

        /* 数量输入框：去掉原生样式 */
        input[type="number"] {
            background: var(--soft-gray);
            border: none;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        /* 弹窗：1:1 复刻 P1H 全屏模糊 */
        .p1h-modal {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
        }
    </style>
</head>
<body class="p-4 md:p-10 max-w-6xl mx-auto">

    <header class="text-center mb-16">
        <h1 class="text-4xl md:text-6xl font-black italic tracking-tighter mb-2">ZEROBASEONE</h1>
        <div class="h-1 w-20 bg-black mx-auto mb-4"></div>
        <p class="text-[10px] font-bold tracking-[0.4em] text-zinc-400 uppercase">Japan 1st EP "PREZENT" Online Lottery</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="p1h-card p-8">
                <h3 class="text-xs font-black mb-6 uppercase tracking-widest flex items-center">
                    <span class="w-2 h-4 bg-green-500 mr-3"></span>01. SELECT MEMBER
                </h3>
                <div id="member-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    </div>
            </div>

            <div class="p1h-card p-6 flex items-center gap-6">
                <div class="w-24 h-24 bg-zinc-100 rounded-2xl flex items-center justify-center font-black text-zinc-300">ZB1</div>
                <div>
                    <h2 class="text-xl font-bold italic">【個別サイン会】抽選権利付きCD</h2>
                    <p class="text-2xl font-black mt-1">¥3,600 <span class="text-xs text-zinc-400 font-normal">tax in</span></p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-1">
            <div class="p1h-card p-8 sticky top-10 border-2 border-zinc-100">
                <h3 class="text-xs font-black mb-6 uppercase tracking-widest">02. QUANTITY</h3>
                <input type="number" id="qty" value="1" min="1" max="10" class="w-full mb-8">
                
                <div class="space-y-4 mb-8">
                    <div class="flex justify-between text-sm font-bold border-b border-zinc-100 pb-2">
                        <span class="text-zinc-400 font-medium">合計金額</span>
                        <span id="price-total" class="text-xl font-black text-green-500">¥3,600</span>
                    </div>
                </div>

                <button onclick="startDraw()" class="p1h-btn w-full py-5 text-lg shadow-xl shadow-zinc-200">
                    抽選に参加する
                </button>
            </div>
        </div>
    </div>

    <div class="mt-12 p1h-card p-8 mb-20">
        <h3 class="text-xs font-black mb-6 uppercase tracking-widest">Draw History</h3>
        <div id="history-box" class="space-y-3 font-bold">
            <p id="empty-hint" class="text-zinc-300 text-center py-4">履歴はありません</p>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 p1h-modal flex flex-col items-center justify-center">
        <div id="loading" class="text-center">
            <div class="w-12 h-12 border-4 border-zinc-100 border-t-green-500 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="font-black text-zinc-400 tracking-widest">CHECKING RESULT...</p>
        </div>
        <div id="result" class="hidden text-center scale-95 transition-transform duration-500">
            <h2 id="res-status" class="text-8xl font-black italic mb-2 tracking-tighter"></h2>
            <p id="res-msg" class="text-zinc-500 font-bold mb-10 text-lg"></p>
            <button onclick="closeModal()" class="px-16 py-4 border-2 border-black rounded-full font-black text-xs hover:bg-black hover:text-white transition">CLOSE</button>
        </div>
    </div>

    <script>
        const members = ["S.HANBIN", "JIWOONG", "ZHANG HAO", "MATTHEW", "TAERAE", "RICKY", "GYUVIN", "GUNWOOK", "YUJIN"];
        let selected = "";

        const grid = document.getElementById('member-grid');
        members.forEach(m => {
            grid.innerHTML += `
                <div class="relative">
                    <input type="radio" name="m" id="${m}" class="member-radio hidden" onchange="selected='${m}'">
                    <label for="${m}" class="p1h-card p-4 block text-center cursor-pointer font-bold text-xs">
                        <span class="p1h-dot"></span>${m}
                    </label>
                </div>
            `;
        });

        document.getElementById('qty').addEventListener('input', (e) => {
            const val = Math.max(1, Math.min(10, e.target.value));
            e.target.value = val;
            document.getElementById('price-total').innerText = `¥${(val * 3600).toLocaleString()}`;
        });

        function startDraw() {
            if(!selected) return alert("SELECT MEMBER");
            const modal = document.getElementById('modal');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            
            modal.classList.remove('hidden');
            loading.classList.remove('hidden');
            result.classList.add('hidden');

            setTimeout(() => {
                loading.classList.add('hidden');
                result.classList.remove('hidden');
                result.classList.add('scale-100');
                
                const win = Math.random() < 0.2;
                const status = document.getElementById('res-status');
                const msg = document.getElementById('res-msg');
                const hist = document.getElementById('history-box');
                document.getElementById('empty-hint').classList.add('hidden');

                if(win) {
                    status.innerText = "当 選";
                    status.className = "text-8xl font-black italic mb-2 tracking-tighter text-green-500";
                    msg.innerHTML = `CONGRATULATIONS!<br>${selected} の当選が確定しました。`;
                    hist.innerHTML = `<div class="p-4 bg-green-50 border border-green-200 rounded-xl flex justify-between items-center text-green-700"><span>${selected} SIGN SESSION</span><span class="font-black italic">WIN</span></div>` + hist.innerHTML;
                } else {
                    status.innerText = "落 選";
                    status.className = "text-8xl font-black italic mb-2 tracking-tighter text-zinc-300";
                    msg.innerText = "またの挑戦をお待ちしております。";
                    hist.innerHTML = `<div class="p-4 bg-zinc-50 border border-zinc-100 rounded-xl flex justify-between items-center text-zinc-400"><span>${selected} SESSION</span><span class="italic font-bold">LOSE</span></div>` + hist.innerHTML;
                }
            }, 1800);
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
