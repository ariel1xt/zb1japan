<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROBASEONE - Japan 1st EP "PREZENT" 抽選会</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Extracting Whoop's signature Neon Colors */
        :root {
            --color-bg: #000000;
            --color-card: #0c0c0c;
            --color-border: #1a1a1a;
            /* Whoop's Neon Green (High Saturation) */
            --color-neon-green: #00ff66;
            /* Whoop's Neon Red (High Saturation) */
            --color-neon-red: #ff3344;
            --color-win: #ffd700;
        }

        body {
            background-color: var(--color-bg);
            color: #ffffff;
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Whoop-style Frosted Glass Card */
        .glass-card {
            background: rgba(12, 12, 12, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: #333;
        }

        /* Member Selector - Neon Accent */
        .member-radio:checked + label {
            border-color: var(--color-neon-green);
            background: rgba(0, 255, 102, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.1);
        }

        /* Member Radio Dot - Whoop's Red Dot */
        .dot {
            width: 8px; height: 8px; border-radius: 50%; background: #222; display: inline-block; margin-right: 10px;
            transition: all 0.2s;
        }
        .member-radio:checked + label .dot {
            background: var(--color-neon-red);
            box-shadow: 0 0 10px var(--color-neon-red);
        }

        /* Input Styling */
        input[type="number"] {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        input[type="number"]:focus {
            border-color: var(--color-neon-green);
            outline: none;
        }

        /* Button Styling - Whoop's Green Glow */
        .btn-primary {
            background: transparent;
            color: var(--color-neon-green);
            border: 2px solid var(--color-neon-green);
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: rgba(0, 255, 102, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
        }
        .btn-primary:active { transform: scale(0.98); }

        /* Lottery Modal */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="p-4 md:p-10 max-w-5xl mx-auto">

    <header class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-black italic tracking-tight" style="background: linear-gradient(90deg, var(--color-neon-green), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            ZEROBASEONE
        </h1>
        <p class="text-[10px] text-zinc-500 tracking-[0.3em] mt-2 uppercase">Japan 1st EP "PREZENT" SPECIAL LOTTERY</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-8">
            
            <div class="glass-card p-6 flex gap-6 items-center">
                <div class="w-24 h-24 bg-zinc-900 rounded-lg flex items-center justify-center border border-zinc-800 shadow-inner">ZB1</div>
                <div>
                    <span class="inline-block bg-red-900 text-red-200 text-xs px-2 py-0.5 rounded-sm mb-1 font-bold">抽選特典付き</span>
                    <h2 class="text-lg font-bold">【個別サイン会】抽選権利付きCD</h2>
                    <p class="text-xl font-mono mt-1 text-white">¥3,600 <span class="text-xs text-zinc-500">(税込)</span></p>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="text-xs font-bold text-zinc-500 mb-5 tracking-widest uppercase">01 メンバーを選択</h3>
                <div id="member-grid" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-1">
            <div class="glass-card p-6 sticky top-10">
                <h3 class="text-xs font-bold text-zinc-500 mb-5 tracking-widest uppercase">02 数量と抽選</h3>
                
                <div class="mb-6">
                    <label class="block text-xs text-zinc-400 mb-2">購入枚数 (最大10枚)</label>
                    <input type="number" id="purchase-count" min="1" max="10" value="1" class="w-full text-lg">
                </div>

                <div class="border-t border-zinc-800 pt-5 mb-6 space-y-2 text-sm">
                    <div class="flex justify-between">
                        <span class="text-zinc-500">抽選回数</span>
                        <span id="summary-draws" class="text-white font-mono">1 回</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold border-t border-zinc-800 pt-3">
                        <span class="text-zinc-500">合計金额</span>
                        <span id="summary-price" class="text-white font-mono">¥3,600</span>
                    </div>
                </div>

                <button onclick="attemptDraw()" class="w-full btn-primary py-4 text-lg">
                    抽選を始める
                </button>
                <p class="text-[10px] text-zinc-600 mt-3 text-center leading-relaxed">
                    ※当選後のキャンセル・変更はできません。<br>
                    ※通信環境の良い場所で行ってください。
                </p>
            </div>
        </div>
    </div>

    <div class="glass-card mt-10 p-6 mb-10">
        <h3 class="text-xs font-bold text-zinc-500 mb-4 tracking-widest uppercase">抽選履歴</h3>
        <div id="history-list" class="space-y-1 text-sm">
            <p id="no-history" class="text-center text-zinc-700 py-4 text-sm">履歴はありません</p>
        </div>
    </div>

    <div id="lottery-modal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center z-50 p-6">
        <div class="bg-zinc-950 border border-zinc-800 p-8 rounded-3xl max-w-sm w-full text-center relative shadow-2xl">
            <div id="modal-loading">
                <div class="w-10 h-10 border-2 border-green-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <h2 class="text-sm tracking-widest text-zinc-400">抽選処理中...</h2>
            </div>
            
            <div id="modal-result" class="hidden">
                <h2 id="result-status" class="text-4xl font-extrabold mb-2"></h2>
                <p id="result-message" class="text-zinc-300 mb-8 text-sm leading-relaxed"></p>
                <button onclick="closeModal()" class="w-full border border-zinc-700 py-3 rounded-full text-zinc-500 text-xs tracking-widest hover:border-white hover:text-white transition">
                    閉じる
                </button>
            </div>
        </div>
    </div>

    <script>
        const members = [
            "ソン・ハンビン", "キム・ジウン", "チャン・ハオ", "ソク・マチュ", 
            "キム・テレ", "リッキー", "キム・ギュビン", "パク・ゴヌク", "ハン・ユジン"
        ];
        const PRICE_PER_ITEM = 3600;
        let selectedMember = null;

        // 1. Initialize Member Grid
        const grid = document.getElementById('member-grid');
        members.forEach((name, index) => {
            const html = `
                <div class="relative">
                    <input type="radio" name="member" id="mem-${index}" value="${name}" class="member-radio hidden" onchange="selectedMember='${name}'">
                    <label for="mem-${index}" class="block glass-card p-3 rounded-xl cursor-pointer border-zinc-900 text-center">
                        <span class="dot"></span><span class="text-xs font-bold text-zinc-100">${name}</span>
                    </label>
                </div>
            `;
            grid.insertAdjacentHTML('beforeend', html);
        });

        // 2. Quantity & Price Update
        const countInput = document.getElementById('purchase-count');
        const summaryDraws = document.getElementById('summary-draws');
        const summaryPrice = document.getElementById('summary-price');

        countInput.addEventListener('input', updateSummary);

        function updateSummary() {
            let count = parseInt(countInput.value);
            if (isNaN(count) || count < 1) count = 1;
            if (count > 10) count = 10;
            countInput.value = count;
            summaryDraws.innerText = `${count} 回`;
            summaryPrice.innerText = `¥${(count * PRICE_PER_ITEM).toLocaleString()}`;
        }

        // 3. Attempt Draw
        function attemptDraw() {
            if (!selectedMember) {
                alert("メンバーを選択してください。");
                return;
            }

            const modal = document.getElementById('lottery-modal');
            const loading = document.getElementById('modal-loading');
            const result = document.getElementById('modal-result');
            
            modal.classList.remove('hidden');
            loading.classList.remove('hidden');
            result.classList.add('hidden');

            const count = parseInt(countInput.value);

            // Simulation delay
            setTimeout(() => {
                loading.classList.add('hidden');
                result.classList.remove('hidden');
                
                // --- Complex Probability logic ---
                // Basic probability per CD: 15%
                const baseProb = 0.15;
                const totalWinProb = 1 - Math.pow((1 - baseProb), count);
                
                const isWin = Math.random() < totalWinProb;
                performResult(isWin, selectedMember, count);
            }, 1800);
        }

        // 4. Handle Result
        function performResult(isWin, member, count) {
            const statusText = document.getElementById('result-status');
            const messageText = document.getElementById('result-message');
            const historyList = document.getElementById('history-list');
            const noHistoryHint = document.getElementById('no-history');
            if(noHistoryHint) noHistoryHint.classList.add('hidden');

            const time = new Date().toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'});

            if (isWin) {
                statusText.innerText = "当 選";
                // Win Color is Neon Green
                statusText.className = "text-4xl font-extrabold mb-2 text-[#00ff66]";
                statusText.style.textShadow = "0 0 15px rgba(0,255,102,0.3)";
                messageText.innerHTML = `おめでとうございます！<br><strong>${member}</strong> さんの【個別サイン会】に当選しました。`;
                
                // History Status with Neon Red WIN tag
                addHistory(time, member, `<span class="text-[#ff3344] font-bold">WIN</span>`);
            } else {
                statusText.innerText = "落 選";
                statusText.className = "text-4xl font-extrabold mb-2 text-zinc-600";
                statusText.style.textShadow = "none";
                messageText.innerText = `残念ながら、今回は落选となりました。`;
                addHistory(time, member, `<span class="text-zinc-600">LOSE</span>`);
            }
        }

        function addHistory(time, member, statusHtml) {
            const historyList = document.getElementById('history-list');
            const historyItem = document.createElement('div');
            historyItem.className = "flex justify-between items-center py-3 border-b border-zinc-900 text-xs";
            historyItem.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-zinc-600 font-mono">${time}</span>
                    <span class="text-zinc-100">【個別サイン会】 ${member}</span>
                </div>
                ${statusHtml}
            `;
            historyList.prepend(historyItem);
        }

        function closeModal() {
            document.getElementById('lottery-modal').classList.add('hidden');
        }

        // Init summary
        updateSummary();
    </script>
</body>
</html>
